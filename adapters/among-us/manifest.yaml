id: among-us
name: Among Us (Impostor Server)
engine: Impostor (community)
steam_app_id: "945360"
version: "1.0.0"

deploy_methods:
  - manual
  - custom

start_command: "./Impostor.Server"
stop_command: "pkill -SIGTERM -f Impostor.Server || true"
restart_command: "pkill -SIGTERM -f Impostor.Server || true"

console:
  type: stdio
  attach_command: "docker attach among-us-server"
  rcon_enabled: false

backup_paths:
  - /data/config
  - /data/plugins

config_templates:
  - path: /data/config.json
    description: "Impostor server configuration"
    sample: |
      {
        "Server": {
          "PublicIp": "0.0.0.0",
          "PublicPort": 22023,
          "ListenIp": "0.0.0.0",
          "ListenPort": 22023
        },
        "AntiCheat": {
          "Enabled": true,
          "BanIpFromGame": true
        }
      }

ports:
  - internal: 22023
    default_external: 22023
    protocol: udp
    description: "Game port"

health_checks:
  - type: tcp
    host: localhost
    port: 22023
    timeout_seconds: 5

mod_support: true
mod_sources:
  - local

recommended_resources:
  cpu_cores: 1
  ram_gb: 1
  disk_gb: 1

notes: |
  Among Us does not have an official dedicated server.
  This manifest uses Impostor, a popular open-source private server.
  GitHub: https://github.com/ImpostorServer/Impostor
  Clients must point their custom server to your server IP:22023.
  Requires Among Us v2021.3.5+ on clients.

manual:
  download_url_template: "https://github.com/ImpostorServer/Impostor/releases/latest"
  java_required: ""
  accept_eula: false

docker:
  image: aeonlucid/impostor
  env_vars:
    IMPOSTOR_Server__PublicIp: "0.0.0.0"
    IMPOSTOR_Server__PublicPort: "22023"
    IMPOSTOR_Server__ListenIp: "0.0.0.0"
    IMPOSTOR_Server__ListenPort: "22023"
