id: valheim
name: Valheim Dedicated Server
engine: Custom (Iron Gate AB)
steam_app_id: "896660"
version: "1.0.0"

deploy_methods:
  - steamcmd
  - manual
  - docker

start_command: "export templdpath=$LD_LIBRARY_PATH; export LD_LIBRARY_PATH=./linux64:$LD_LIBRARY_PATH; export SteamAppId=892970; ./valheim_server.x86_64 -nographics -batchmode -name \"{name}\" -port 2456 -world \"Dedicated\" -password \"changeme\" -savedir {install_dir}/data/worlds -public 1"
stop_command: "pkill -SIGTERM -f valheim_server.x86_64 || true"
restart_command: "pkill -HUP -f valheim_server.x86_64 || true"

console:
  type: stdio
  attach_command: "docker attach valheim-server"
  rcon_enabled: false

backup_paths:
  - /data/worlds
  - /data/characters
  - /opt/valheim/config

config_templates:
  - path: /opt/valheim/start_valheim.sh
    description: "Server startup script — edit name, password, world, and options here"
    sample: |
      #!/bin/bash
      export templdpath=$LD_LIBRARY_PATH
      export LD_LIBRARY_PATH=./linux64:$LD_LIBRARY_PATH
      export SteamAppId=892970
      ./valheim_server.x86_64 \
        -nographics -batchmode \
        -name "My Valheim Server" \
        -port 2456 \
        -world "Dedicated" \
        -password "changeme" \
        -savedir "/data/worlds" \
        -public 1 \
        -crossplay
      # -public 0           # Set to 0 to make server unlisted (invite only)
      # -crossplay          # Remove this line to disable Xbox/Game Pass crossplay
      # -preset Normal      # Presets: Normal Casual Easy Hard Hardcore Immersive Hammer
      # -modifier combat easy          # combat: veryeasy easy hard veryhard
      # -modifier deathpenalty casual  # deathpenalty: casual easy normal hard hardcore
      # -modifier resources more       # resources: muchless less more muchmore mostmore
      # -modifier raids none           # raids: none less more muchmore
      # -modifier portals casual       # portals: casual hard veryhard
      export LD_LIBRARY_PATH=$templdpath

  - path: /opt/valheim/adminlist.txt
    description: "Admin Steam IDs — one 64-bit SteamID per line"
    sample: |
      # Valheim admin list
      # Add your 64-bit Steam ID (one per line) to grant admin commands in-game.
      # Find your Steam ID at: https://steamid.io
      # Example:
      # 76561198012345678

  - path: /opt/valheim/bannedlist.txt
    description: "Banned Steam IDs — one 64-bit SteamID per line"
    sample: |
      # Valheim ban list
      # Steam IDs listed here are permanently banned from this server.
      # One 64-bit Steam ID per line.

  - path: /opt/valheim/permittedlist.txt
    description: "Whitelist — if non-empty, only listed Steam IDs can join"
    sample: |
      # Valheim permitted list (whitelist)
      # If this file contains any Steam IDs, ONLY those players can connect.
      # Leave empty to allow all players (subject to password).
      # One 64-bit Steam ID per line.

ports:
  - internal: 2456
    default_external: 2456
    protocol: udp
    description: "Game port"
  - internal: 2457
    default_external: 2457
    protocol: udp
    description: "Game port +1 (auto)"
  - internal: 2458
    default_external: 2458
    protocol: udp
    description: "Game port +2 (auto)"

health_checks:
  - type: tcp
    host: localhost
    port: 2456
    timeout_seconds: 5
  - type: command
    command: "nc -zu localhost 2456 && echo 'ok' || echo 'fail'"
    expected_output: "ok"

mod_support: true
mod_sources:
  - nexusmods
  - thunderstore
  - local

recommended_resources:
  cpu_cores: 2
  ram_gb: 4
  disk_gb: 5

notes: |
  Valheim Dedicated Server is a Viking survival game server.
  SteamCMD App ID: 896660 (server), 892970 (game).
  No RCON support - attach via stdio or docker exec.
  Worlds are stored per-character in /data/worlds.
  The server must be public (0) or listed (1).
  Port +1 and +2 are automatically opened by the server.

steamcmd:
  login: anonymous
  app_id: "896660"
  validate: true
  beta: ""
  install_dir_env: "VALHEIM_DIR"
  exec_bins:
    - valheim_server.x86_64
    - linux64/steamclient.so

docker:
  image: lloesche/valheim-server
  pull: docker pull lloesche/valheim-server
  env_vars:
    SERVER_NAME: "My Valheim Server"
    WORLD_NAME: "Dedicated"
    SERVER_PASSWORD: "changeme"
    SERVER_PUBLIC: "1"
    UPDATE_CRON: "*/15 * * * *"
    RESTART_CRON: "0 5 * * *"
    STEAMCMD_ARGS: "validate"
    SUPERVISOR_HTTP: "1"
    SUPERVISOR_HTTP_PASS: "changeme"
    SUPERVISOR_HTTP_USER: "admin"
