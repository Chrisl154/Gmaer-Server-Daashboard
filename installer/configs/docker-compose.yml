version: "3.9"

# Games Dashboard - Docker Compose deployment
# Generated by the installer. Edit as needed.

services:
  daemon:
    image: ghcr.io/games-dashboard/daemon:${VERSION:-1.0.0}
    container_name: games-dashboard-daemon
    restart: unless-stopped
    ports:
      - "8443:8443"
    volumes:
      - daemon-config:/etc/games-dashboard
      - daemon-data:/var/lib/games-dashboard
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GDASH_ADMIN_PASSWORD: ${GDASH_ADMIN_PASSWORD:-changeme}
    networks:
      - games-dashboard
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:8443/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ui:
    image: ghcr.io/games-dashboard/ui:${VERSION:-1.0.0}
    container_name: games-dashboard-ui
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    environment:
      VITE_DAEMON_URL: https://daemon:8443
    networks:
      - games-dashboard
    depends_on:
      daemon:
        condition: service_healthy

volumes:
  daemon-config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${INSTALL_DIR:-/opt/games-dashboard}/config
  daemon-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${INSTALL_DIR:-/opt/games-dashboard}/data

networks:
  games-dashboard:
    driver: bridge
