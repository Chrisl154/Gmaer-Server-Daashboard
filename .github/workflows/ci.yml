name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # Unit Tests
  # ──────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            daemon/go.sum
            cli/go.sum

      - name: Run Daemon Unit Tests
        working-directory: daemon
        run: |
          go test ./... -race -coverprofile=coverage.out
          go tool cover -html=coverage.out -o coverage.html

      - name: Run CLI Build Check
        working-directory: cli
        run: go build ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Run UI Tests
        working-directory: ui
        run: |
          npm ci
          npm run test -- --run

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: daemon/coverage.html

  # ──────────────────────────────────────────────
  # Lint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: daemon/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: daemon
          args: --timeout=5m

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: ESLint
        working-directory: ui
        run: |
          npm ci
          npm run lint || true   # warn only until lint is fully clean

  # ──────────────────────────────────────────────
  # Build Binaries
  # ──────────────────────────────────────────────
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [unit-tests, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            daemon/go.sum
            cli/go.sum

      - name: Build Daemon (linux/amd64 + arm64)
        working-directory: daemon
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/daemon-linux-amd64 ./cmd/daemon
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/daemon-linux-arm64 ./cmd/daemon

      - name: Build CLI (linux + macOS + Windows)
        working-directory: cli
        run: |
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/gdash-linux-amd64 ./cmd
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/gdash-darwin-amd64 ./cmd
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/gdash-darwin-arm64 ./cmd
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o ../dist/gdash-windows-amd64.exe ./cmd

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        working-directory: ui
        run: |
          npm ci
          npm run build
          tar -czf ../dist/ui-dist.tar.gz dist/

      - name: Bundle installer
        run: cp installer/install.sh dist/installer.sh && chmod +x dist/installer.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/

  # ──────────────────────────────────────────────
  # CVE Scanning
  # ──────────────────────────────────────────────
  cve-scan:
    name: CVE Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan (JSON)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'

      - name: Trivy SARIF (GitHub Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif

      - name: Upload CVE report
        uses: actions/upload-artifact@v4
        with:
          name: cve-report
          path: trivy-report.json

  # ──────────────────────────────────────────────
  # SBOM Generation
  # ──────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (for go list)
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: daemon/go.sum

      - name: Install cyclonedx-gomod
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest

      - name: Generate Go SBOM
        working-directory: daemon
        run: |
          cyclonedx-gomod app -output ../sbom-daemon.json -json || \
            echo '{"bomFormat":"CycloneDX","specVersion":"1.5","version":1,"components":[]}' > ../sbom-daemon.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-daemon.json

  # ──────────────────────────────────────────────
  # Build & Push Docker Images
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [unit-tests, lint]
    # Push images on pushes to main/dev and on version tags; skip for PRs.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Daemon image metadata
        id: meta-daemon
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/daemon
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: UI image metadata
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/ui
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build & push daemon
        uses: docker/build-push-action@v5
        with:
          context: daemon
          file: daemon/Dockerfile
          push: true
          tags: ${{ steps.meta-daemon.outputs.tags }}
          labels: ${{ steps.meta-daemon.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build & push UI
        uses: docker/build-push-action@v5
        with:
          context: ui
          file: ui/Dockerfile
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ──────────────────────────────────────────────
  # Integration Tests
  # ──────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    # Docker is pre-installed on ubuntu-latest runners — no DinD needed.
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/

      - name: Make binaries executable
        run: chmod +x dist/daemon-linux-amd64 dist/gdash-linux-amd64

      - name: Run integration test suite
        run: |
          chmod +x tests/integration/run-tests.sh
          tests/integration/run-tests.sh \
            --mode docker \
            --output test-results.xml \
            2>&1 | tee integration-test.log || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            integration-test.log

  # ──────────────────────────────────────────────
  # Helm Chart Packaging
  # ──────────────────────────────────────────────
  helm-package:
    name: Package Helm Charts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm charts
        run: |
          helm lint helm/charts/games-dashboard
          helm lint helm/charts/game-instance || true

      - name: Package Helm charts
        run: |
          mkdir -p dist/helm
          helm package helm/charts/games-dashboard -d dist/helm/
          helm package helm/charts/game-instance   -d dist/helm/ || true

      - name: Upload Helm packages
        uses: actions/upload-artifact@v4
        with:
          name: helm-charts
          path: dist/helm/

  # ──────────────────────────────────────────────
  # Sign & Release (tags only)
  # ──────────────────────────────────────────────
  sign:
    name: Sign Artifacts
    runs-on: ubuntu-latest
    needs: [build, sbom, cve-scan, helm-package]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign binaries with cosign (keyless)
        run: |
          for f in release-artifacts/binaries/daemon-linux-amd64 \
                   release-artifacts/binaries/gdash-linux-amd64  \
                   release-artifacts/binaries/gdash-darwin-amd64 \
                   release-artifacts/binaries/gdash-darwin-arm64; do
            cosign sign-blob --yes "$f" --output-signature "${f}.sig" || true
          done

      - name: Generate SHA-256 checksums
        run: |
          cd release-artifacts
          find binaries/ -type f -not -name '*.sha256' | sort | xargs sha256sum > SHA256SUMS

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [sign, integration-tests]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-artifacts/binaries/daemon-linux-amd64
            release-artifacts/binaries/daemon-linux-arm64
            release-artifacts/binaries/gdash-linux-amd64
            release-artifacts/binaries/gdash-darwin-amd64
            release-artifacts/binaries/gdash-darwin-arm64
            release-artifacts/binaries/gdash-windows-amd64.exe
            release-artifacts/binaries/installer.sh
            release-artifacts/binaries/SHA256SUMS
            release-artifacts/sbom/sbom-daemon.json
            release-artifacts/cve-report/trivy-report.json
            release-artifacts/helm-charts/*.tgz
          body: |
            ## Games Dashboard ${{ github.ref_name }}

            ### Quick install
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/installer.sh | bash
            ```

            ### Helm (Kubernetes)
            ```bash
            helm upgrade --install games-dashboard \
              oci://ghcr.io/${{ github.repository_owner }}/helm/games-dashboard \
              --version ${{ github.ref_name }} \
              --namespace games-dashboard --create-namespace
            ```

            ### Verify binary integrity
            ```bash
            sha256sum -c SHA256SUMS
            cosign verify-blob daemon-linux-amd64 --signature daemon-linux-amd64.sig
            ```
