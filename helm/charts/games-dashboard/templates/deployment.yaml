{{- /* Daemon Deployment */ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "games-dashboard.fullname" . }}-daemon
  labels:
    {{- include "games-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: daemon
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "games-dashboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: daemon
  template:
    metadata:
      labels:
        {{- include "games-dashboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: daemon
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "games-dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: daemon
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.daemon.repository }}:{{ .Values.image.daemon.tag }}"
          imagePullPolicy: {{ .Values.image.daemon.pullPolicy }}
          args:
            - "--bind={{ .Values.daemon.bindAddr }}"
            - "--log-level={{ .Values.daemon.logLevel }}"
            - "--tls-cert={{ .Values.daemon.tls.certFile }}"
            - "--tls-key={{ .Values.daemon.tls.keyFile }}"
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.daemon.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/games-dashboard
              readOnly: true
            - name: data
              mountPath: /var/lib/games-dashboard
            - name: tls
              mountPath: /etc/games-dashboard/tls
              readOnly: true
          env:
            - name: LOG_LEVEL
              value: {{ .Values.daemon.logLevel | quote }}
      volumes:
        - name: config
          configMap:
            name: {{ include "games-dashboard.fullname" . }}-config
        - name: data
          {{- if .Values.storage.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "games-dashboard.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tls
          secret:
            secretName: {{ include "games-dashboard.fullname" . }}-tls
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- /* UI Deployment */ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "games-dashboard.fullname" . }}-ui
  labels:
    {{- include "games-dashboard.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "games-dashboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "games-dashboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ui
          image: "{{ .Values.image.ui.repository }}:{{ .Values.image.ui.tag }}"
          imagePullPolicy: {{ .Values.image.ui.pullPolicy }}
          ports:
            - name: https
              containerPort: 443
              protocol: TCP
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          env:
            - name: VITE_DAEMON_URL
              value: "https://{{ include "games-dashboard.fullname" . }}-daemon:8443"
