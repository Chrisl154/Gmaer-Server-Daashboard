apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gameinstances.games.dashboard.dev
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: games.dashboard.dev
  names:
    kind: GameInstance
    listKind: GameInstanceList
    plural: gameinstances
    singular: gameinstance
    shortNames:
      - gi
      - game
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Adapter
          type: string
          jsonPath: .spec.adapter
        - name: State
          type: string
          jsonPath: .status.state
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["adapter"]
              properties:
                adapter:
                  type: string
                  description: "Game adapter ID (e.g., valheim, minecraft)"
                  enum:
                    - valheim
                    - minecraft
                    - satisfactory
                    - palworld
                    - eco
                    - enshrouded
                    - riftbreaker
                deployMethod:
                  type: string
                  enum: [steamcmd, manual, custom]
                  default: steamcmd
                installDir:
                  type: string
                  default: "/opt/games"
                steamcmd:
                  type: object
                  properties:
                    appId:
                      type: string
                    beta:
                      type: string
                    validate:
                      type: boolean
                      default: true
                manual:
                  type: object
                  properties:
                    archiveUrl:
                      type: string
                    checksum:
                      type: string
                ports:
                  type: array
                  items:
                    type: object
                    required: [internal, external, protocol]
                    properties:
                      internal:
                        type: integer
                      external:
                        type: integer
                      protocol:
                        type: string
                        enum: [tcp, udp]
                      exposed:
                        type: boolean
                        default: false
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:    { type: string }
                        memory: { type: string }
                    limits:
                      type: object
                      properties:
                        cpu:    { type: string }
                        memory: { type: string }
                backup:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    schedule:
                      type: string
                      default: "0 3 * * *"
                    target:
                      type: string
                    retainDays:
                      type: integer
                      default: 30
                config:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                state:
                  type: string
                  enum: [idle, deploying, running, stopped, starting, stopping, error]
                podName:
                  type: string
                podIP:
                  type: string
                lastStarted:
                  type: string
                  format: date-time
                lastStopped:
                  type: string
                  format: date-time
                deployJobId:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:   { type: string }
                      status: { type: string }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime:
                        type: string
                        format: date-time
